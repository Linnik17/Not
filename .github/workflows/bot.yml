name: bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - run: pip install -r requirements.txt

    - name: run bot
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: python main.py
